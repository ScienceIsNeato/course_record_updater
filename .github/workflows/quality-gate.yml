name: Quality Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  PYTHON_VERSION: "3.11"
  DATABASE_TYPE: "sqlite"
  DATABASE_URL: "sqlite:///loopcloser.db"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Generate cache key
        id: cache-key
        run: echo "key=${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}" >> $GITHUB_OUTPUT
      - name: Cache pip dependencies
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ~/.cache/pip
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-pip-

  slopmop-scour:
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip dependencies
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ~/.cache/pip
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install JavaScript dependencies
        run: npm install
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install --no-cache-dir slopmop==0.12.0
      - name: Fix slopmop template dirs
        run: python scripts/ci_fix_slopmop_templates.py
      - name: Run slopmop scour (single source of truth)
        run: |
          sm scour --json --output-file slopmop-results.json --no-cache
        env:
          PYTHONPATH: .
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
      - name: Upload slopmop results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slopmop-results
          path: |
            slopmop-results.json
            .slopmop/**
            bandit-report.json
            safety-report.txt
            semgrep-report.json
            coverage.xml
            test-results.xml
